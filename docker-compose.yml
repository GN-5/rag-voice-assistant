services:

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    environment:
      - NODE_IP=${NODE_IP}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  speaches:
    build:
      context: .
      dockerfile: speaches/Dockerfile
    ports:
      - "8000:8000"
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL}
      ENABLE_UI: "false"
      PRELOAD_MODELS: '["Systran/faster-whisper-medium"]'
      STT_MODEL_TTL: "-1"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    ports:
      - "8880:8880"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  rag-service:
    build: ./rag-service
    ports:
      - "8100:8100"
    environment:
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - RERANKER_MODEL=${RERANKER_MODEL}
      - TOP_K_RETRIEVE=${TOP_K_RETRIEVE}
      - TOP_K_RERANK=${TOP_K_RERANK}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    volumes:
      - ./rag-service/storage:/app/storage
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      - livekit

  nginx:
    build: ./nginx
    ports:
      - "443:443"
    restart: unless-stopped
    depends_on:
      - rag-service
      - livekit

  agent:
    build: ./agent
    environment:
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LLAMA_CPP_BASE_URL=${LLAMA_CPP_BASE_URL}
      - RAG_SERVICE_URL=${RAG_SERVICE_URL}
      - KOKORO_BASE_URL=${KOKORO_BASE_URL}
      - AGENT_NAME=${AGENT_NAME}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      - livekit
      - speaches
      - kokoro
      - rag-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  hf-cache:
