<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Voice Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 680px 1fr;
      height: 100vh;
    }

    .col-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #connect-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    #connect-screen h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff;
    }

    #big-connect-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 500;
      background: #2563eb;
      color: #fff;
      transition: background 0.2s;
    }
    #big-connect-btn:hover { background: #1d4ed8; }
    #big-connect-btn:disabled { background: #444; cursor: not-allowed; }

    #session-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    #soundwave-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1vw;
      height: 30vh;
      min-height: 120px;
      flex-shrink: 0;
      transition: opacity 0.3s;
    }

    .wave-bar {
      width: 2.5vw;
      min-width: 20px;
      max-width: 40px;
      height: 15vh;
      min-height: 60px;
      background: #fff;
      border-radius: 2vw;
      transition: transform 0.15s ease;
    }

    #soundwave-container.listening .wave-bar {
      animation: idleWave 2s ease-in-out infinite;
    }
    #soundwave-container.listening .wave-bar:nth-child(1) { animation-delay: 0s; }
    #soundwave-container.listening .wave-bar:nth-child(2) { animation-delay: 0.15s; }
    #soundwave-container.listening .wave-bar:nth-child(3) { animation-delay: 0.3s; }
    #soundwave-container.listening .wave-bar:nth-child(4) { animation-delay: 0.45s; }
    #soundwave-container.listening .wave-bar:nth-child(5) { animation-delay: 0.6s; }
    #soundwave-container.listening .wave-bar:nth-child(6) { animation-delay: 0.75s; }
    #soundwave-container.listening .wave-bar:nth-child(7) { animation-delay: 0.9s; }

    @keyframes idleWave {
      0%, 100% { transform: scaleY(0.35); }
      50% { transform: scaleY(0.65); }
    }

    #soundwave-container.thinking .wave-bar {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(0.85); }
    }

    #soundwave-container.speaking .wave-bar {
      animation: speakActive 0.8s ease-in-out infinite;
    }
    #soundwave-container.speaking .wave-bar:nth-child(1) { animation-delay: 0.00s; animation-duration: 0.7s; }
    #soundwave-container.speaking .wave-bar:nth-child(2) { animation-delay: 0.12s; animation-duration: 0.85s; }
    #soundwave-container.speaking .wave-bar:nth-child(3) { animation-delay: 0.05s; animation-duration: 0.65s; }
    #soundwave-container.speaking .wave-bar:nth-child(4) { animation-delay: 0.18s; animation-duration: 0.9s; }
    #soundwave-container.speaking .wave-bar:nth-child(5) { animation-delay: 0.08s; animation-duration: 0.75s; }
    #soundwave-container.speaking .wave-bar:nth-child(6) { animation-delay: 0.22s; animation-duration: 0.8s; }
    #soundwave-container.speaking .wave-bar:nth-child(7) { animation-delay: 0.03s; animation-duration: 0.72s; }

    @keyframes speakActive {
      0% { transform: scaleY(0.2); }
      25% { transform: scaleY(0.95); }
      50% { transform: scaleY(0.4); }
      75% { transform: scaleY(1.0); }
      100% { transform: scaleY(0.3); }
    }

    #chat-container {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scroll-behavior: smooth;
      transition: opacity 0.3s;
    }

    .bubble {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .bubble.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: #2a2a2a;
      color: #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    #tray {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 50px;
      margin-top: auto;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    #mute-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #333;
      font-size: 1.2rem;
      transition: background 0.2s;
    }
    #mute-btn:hover { background: #444; }
    #mute-btn.muted { background: #7f1d1d; }
    #mute-btn.auto-muted { background: #78350f; }

    #file-menu { position: relative; }
    #file-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #333;
      font-size: 1.2rem;
      transition: background 0.2s;
    }
    #file-btn:hover { background: #444; }

    #file-dropdown {
      display: none;
      position: absolute;
      bottom: 54px;
      right: 0;
      min-width: 200px;
      max-width: 280px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 0.5rem;
      z-index: 200;
    }
    #file-dropdown.open { display: block; }

    #file-dropdown-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 0.3rem;
    }
    #file-dropdown-header span { font-size: 0.8rem; color: #888; }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0.5rem;
      font-size: 0.8rem;
      color: #ccc;
      border-radius: 6px;
    }
    .file-item:hover { background: #222; }
    .file-item .del-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0.3rem;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .file-item:hover .del-btn { opacity: 1; }

    #file-upload-input { display: none; }

    #view-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #333;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    #view-toggle:hover { background: #444; }

    .tray-divider {
      width: 1px;
      height: 24px;
      background: #333;
      margin: 0 0.15rem;
    }

    #status {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #555;
      z-index: 100;
    }

    .progress-wrap {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      z-index: 100;
    }
    progress { width: 100%; height: 4px; border-radius: 2px; appearance: none; }
    progress::-webkit-progress-bar { background: #333; border-radius: 2px; }
    progress::-webkit-progress-value { background: #2563eb; border-radius: 2px; }
    #progress-label { font-size: 0.7rem; color: #666; margin-top: 2px; text-align: center; }

    #soundwave-container.hidden { display: none; }
    #chat-container.hidden { display: none; }

    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

  <div id="status">Initialising...</div>

  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <progress id="progress-bar" value="0" max="1"></progress>
    <div id="progress-label">Indexing...</div>
  </div>

  <div class="layout">
    <div></div>
    <div class="col-center">
      <div id="connect-screen">
        <h1>RAG Voice Assistant</h1>
        <button id="big-connect-btn" onclick="toggleSession()" disabled>
          <span>&#9654;</span> Connect
        </button>
      </div>

      <div id="session-screen">
        <div id="soundwave-container" class="listening">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>

        <div id="chat-container" class="hidden"></div>

        <div id="tray">
          <button id="mute-btn" onclick="toggleMute()">
            <span id="mute-icon">🎤</span>
          </button>

          <div class="tray-divider"></div>

          <div id="file-menu">
            <button id="file-btn" onclick="toggleFileDropdown()">📁</button>
            <div id="file-dropdown">
              <div id="file-dropdown-header">
                <span>Documents</span>
                <button id="file-upload-trigger" onclick="document.getElementById('file-upload-input').click()" style="background:none;border:none;color:#2563eb;cursor:pointer;font-size:1rem;">+</button>
              </div>
              <div id="file-list"></div>
            </div>
          </div>
          <input type="file" id="file-upload-input" accept=".pdf,.docx,.txt,.md" onchange="uploadFile(event)">

          <div class="tray-divider"></div>

          <button id="view-toggle" onclick="toggleView()">
            <span id="view-icon">💬</span>
          </button>

          <div class="tray-divider"></div>

          <button id="disconnect-btn" onclick="disconnectSession()" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:#7f1d1d;font-size:1.1rem;transition:background 0.2s;" onmouseover="this.style.background='#991b1b'" onmouseout="this.style.background='#7f1d1b'">
            📞
          </button>
        </div>
      </div>
    </div>
    <div></div>
  </div>

  <script>
    const LIVEKIT_SERVER_URL = window.location.protocol === "https:"
      ? `wss://${window.location.hostname}`
      : "ws://100.122.86.75:7880";
    const RAG_BASE = "";
    const TOKEN_URL = `${RAG_BASE}/livekit-token`;

    const WORD_REVEAL_INTERVAL = 200;

    let room = null;
    let isConnected = false;
    let isIndexing = false;
    let isMuted = false;
    let isAutoMuted = false;
    let localAudioTrack = null;

    let currentView = "auto";
    let currentState = "";
    let pendingAssistantText = "";
    let wordRevealTimer = null;
    let revealedWordCount = 0;
    let assistantBubbleEl = null;
    let wordRevealStarted = false;

    window.addEventListener("DOMContentLoaded", async () => {
      await loadDocuments();
      watchIndexingProgress();
      document.getElementById("big-connect-btn").disabled = false;
      setStatus("Ready");
      updateView();
    });

    async function toggleSession() {
      if (isConnected) {
        await disconnectSession();
      } else {
        await connectSession();
      }
    }

    async function connectSession() {
      if (isIndexing) {
        setStatus("Please wait for indexing to complete.");
        return;
      }
      try {
        setStatus("Fetching token...");
        console.log("[LiveKit] Fetching token from:", TOKEN_URL);
        const res = await fetch(TOKEN_URL);
        const { token } = await res.json();
        console.log("[LiveKit] Token received");

        room = new LivekitClient.Room();

        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
          if (track.kind === LivekitClient.Track.Kind.Audio) {
            const el = track.attach();
            el.style.display = "none";
            document.body.appendChild(el);
          }
        });

        room.on(LivekitClient.RoomEvent.DataReceived, (payload, participant, topic) => {
          try {
            const msg = JSON.parse(new TextDecoder().decode(payload));
            console.log("[LiveKit] Data received:", msg);
            if (msg.type === "transcript") {
              console.log("[Transcript]", msg.text);
              addUserBubble(msg.text);
            } else if (msg.type === "state") {
              console.log("[State]", msg.state);
              setState(msg.state);
            } else if (msg.type === "assistant_text") {
              console.log("[AssistantText]", msg.text);
              pendingAssistantText = msg.text;
              if (wordRevealStarted && assistantBubbleEl) {
                assistantBubbleEl.textContent = pendingAssistantText;
                clearWordReveal();
              }
            }
          } catch (e) {
            console.warn("[LiveKit] Failed to parse data:", e);
          }
        });

        room.on(LivekitClient.RoomEvent.Disconnected, (reason) => {
          console.log("[LiveKit] Disconnected:", reason);
          isConnected = false;
          isMuted = false;
          isAutoMuted = false;
          setStatus("Disconnected");
          setState("");
          clearWordReveal();
          document.getElementById("chat-container").innerHTML = "";
          document.getElementById("connect-screen").style.display = "flex";
          document.getElementById("session-screen").style.display = "none";
        });

        await room.connect(LIVEKIT_SERVER_URL, token);
        console.log("[LiveKit] Connected to room:", room.name);
        await room.localParticipant.setMicrophoneEnabled(true);
        localAudioTrack = room.localParticipant.audioTrackPublications.values().next().value?.track;
        console.log("[LiveKit] Microphone enabled, track:", localAudioTrack ? "captured" : "not found");

        isConnected = true;
        setStatus("");
        setState("listening");
        document.getElementById("connect-screen").style.display = "none";
        document.getElementById("session-screen").style.display = "flex";
      } catch (err) {
        console.error("[LiveKit] Connection error:", err);
        setStatus("Connection failed: " + err.message);
      }
    }

    async function disconnectSession() {
      if (room) {
        await room.disconnect();
        room = null;
      }
      localAudioTrack = null;
      document.querySelectorAll("audio").forEach(el => el.remove());
      isConnected = false;
      isMuted = false;
      isAutoMuted = false;
      setStatus("Disconnected");
      setState("");
      clearWordReveal();
      document.getElementById("chat-container").innerHTML = "";
      document.getElementById("connect-screen").style.display = "flex";
      document.getElementById("session-screen").style.display = "none";
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function setState(state) {
      currentState = state;
      const sw = document.getElementById("soundwave-container");
      sw.className = state || "listening";

      if (state === "speaking") {
        isAutoMuted = true;
        setMicMuted(true);
        wordRevealStarted = true;
        startWordReveal();
      } else if (state === "listening") {
        if (isAutoMuted && !isMuted) {
          isAutoMuted = false;
          setMicMuted(false);
        }
        isAutoMuted = false;
        wordRevealStarted = false;
        clearWordReveal();
        if (pendingAssistantText && assistantBubbleEl) {
          assistantBubbleEl.textContent = pendingAssistantText;
        }
        pendingAssistantText = "";
        assistantBubbleEl = null;
      } else if (state === "thinking") {
        isAutoMuted = false;
        wordRevealStarted = false;
        clearWordReveal();
      }

      updateView();
    }

    function startWordReveal() {
      if (!pendingAssistantText) {
        assistantBubbleEl = addAssistantBubble("...");
        return;
      }
      clearWordReveal();
      assistantBubbleEl = addAssistantBubble("");
      const words = pendingAssistantText.split(/\s+/);
      revealedWordCount = 0;

      wordRevealTimer = setInterval(() => {
        if (revealedWordCount < words.length) {
          assistantBubbleEl.textContent = words.slice(0, revealedWordCount + 1).join(" ");
          revealedWordCount++;
          scrollToBottom();
        } else {
          clearWordReveal();
        }
      }, WORD_REVEAL_INTERVAL);
    }

    function clearWordReveal() {
      if (wordRevealTimer) {
        clearInterval(wordRevealTimer);
        wordRevealTimer = null;
      }
      revealedWordCount = 0;
    }

    function addUserBubble(text) {
      const container = document.getElementById("chat-container");
      const bubble = document.createElement("div");
      bubble.className = "bubble user";
      bubble.textContent = text;
      container.appendChild(bubble);
      scrollToBottom();
    }

    function addAssistantBubble(text) {
      const container = document.getElementById("chat-container");
      const bubble = document.createElement("div");
      bubble.className = "bubble assistant";
      bubble.textContent = text;
      container.appendChild(bubble);
      scrollToBottom();
      return bubble;
    }

    function scrollToBottom() {
      const container = document.getElementById("chat-container");
      container.scrollTop = container.scrollHeight;
    }

    function updateView() {
      const sw = document.getElementById("soundwave-container");
      const chat = document.getElementById("chat-container");
      const viewIcon = document.getElementById("view-icon");

      if (currentView === "auto") {
        if (currentState === "speaking") {
          sw.classList.remove("hidden");
          chat.classList.add("hidden");
          viewIcon.textContent = "💬";
        } else {
          sw.classList.add("hidden");
          chat.classList.remove("hidden");
          viewIcon.textContent = "〰️";
        }
      } else if (currentView === "soundwave") {
        sw.classList.remove("hidden");
        chat.classList.add("hidden");
        viewIcon.textContent = "〰️";
      } else {
        sw.classList.add("hidden");
        chat.classList.remove("hidden");
        viewIcon.textContent = "💬";
      }
    }

    function toggleView() {
      if (currentView === "auto") currentView = "soundwave";
      else if (currentView === "soundwave") currentView = "chat";
      else currentView = "auto";
      updateView();
    }

    async function setMicMuted(muted) {
      if (!localAudioTrack) return;
      try {
        if (muted) {
          await localAudioTrack.mute();
        } else {
          await localAudioTrack.unmute();
        }
        console.log("[LiveKit] Microphone", muted ? "muted" : "unmuted");
        updateMuteButton();
      } catch (err) {
        console.error("[LiveKit] Failed to toggle mic:", err);
      }
    }

    function toggleMute() {
      isMuted = !isMuted;
      isAutoMuted = false;
      setMicMuted(isMuted);
    }

    function updateMuteButton() {
      const btn = document.getElementById("mute-btn");
      const icon = document.getElementById("mute-icon");
      btn.className = isMuted ? "muted" : (isAutoMuted ? "auto-muted" : "");
      icon.textContent = (isMuted || isAutoMuted) ? "🔇" : "🎤";
    }

    function toggleFileDropdown() {
      document.getElementById("file-dropdown").classList.toggle("open");
    }

    document.addEventListener("click", (e) => {
      if (!e.target.closest("#file-menu")) {
        document.getElementById("file-dropdown").classList.remove("open");
      }
    });

    async function loadDocuments() {
      const res = await fetch(`${RAG_BASE}/documents`);
      const data = await res.json();
      renderFileList(data.documents || []);
    }

    function renderFileList(docs) {
      const list = document.getElementById("file-list");
      list.innerHTML = "";
      if (docs.length === 0) {
        list.innerHTML = '<div style="padding:0.5rem;font-size:0.8rem;color:#666;">No documents</div>';
        return;
      }
      docs.forEach(doc => {
        const item = document.createElement("div");
        item.className = "file-item";
        item.innerHTML = `
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${doc.filename}</span>
          <button class="del-btn" onclick="deleteDocument('${doc.filename}')">&minus;</button>
        `;
        list.appendChild(item);
      });
    }

    async function uploadFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = "";

      setIndexingUI(true, 0, "uploading");
      try {
        const formData = new FormData();
        formData.append("file", file);
        const res = await fetch(`${RAG_BASE}/upload`, { method: "POST", body: formData });
        if (!res.ok) {
          const err = await res.json();
          alert("Upload failed: " + err.detail);
          setIndexingUI(false);
        }
      } catch (err) {
        alert("Upload error: " + err.message);
        setIndexingUI(false);
      }
    }

    async function deleteDocument(filename) {
      if (!confirm(`Delete "${filename}"?`)) return;
      const res = await fetch(`${RAG_BASE}/documents/${encodeURIComponent(filename)}`, { method: "DELETE" });
      if (res.ok) await loadDocuments();
      else alert("Delete failed");
    }

    let indexingES = null;

    function watchIndexingProgress() {
      if (indexingES) { indexingES.close(); indexingES = null; }
      indexingES = new EventSource(`${RAG_BASE}/index-progress`);
      indexingES.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const progress = parseFloat(data.progress);
        const stage = data.stage || "";
        if (progress >= 1.0) {
          setIndexingUI(false);
          loadDocuments();
          indexingES.close();
          indexingES = null;
          setTimeout(watchIndexingProgress, 2000);
        } else {
          setIndexingUI(true, progress, stage);
        }
      };
      indexingES.onerror = () => {
        if (indexingES) { indexingES.close(); indexingES = null; }
        setTimeout(watchIndexingProgress, 5000);
      };
    }

    function setIndexingUI(active, progress = 0, stage = "") {
      isIndexing = active;
      const wrap = document.getElementById("progress-wrap");
      const bar = document.getElementById("progress-bar");
      const label = document.getElementById("progress-label");
      wrap.style.display = active ? "block" : "none";
      bar.value = progress;
      label.textContent = active ? `${stage.replace(/_/g, " ")} (${Math.round(progress * 100)}%)` : "";
    }
  </script>
</body>
</html>
